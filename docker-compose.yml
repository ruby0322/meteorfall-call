services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: marketmage
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-marketmage-local-dev-change-me}
    ports:
      - "${POSTGRES_PORT_BIND:-127.0.0.1:5432}:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d marketmage"]
      interval: 5s
      timeout: 5s
      retries: 5
    volumes:
      - postgres-data:/var/lib/postgresql/data

volumes:
  postgres-data:
