services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: marketmage
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-marketmage-local-dev-change-me}
    # No host port bind by default — backend reaches postgres:5432 on the compose network.
    # If you need host psql access, add docker-compose.override.yml:
    #   services.postgres.ports: ["127.0.0.1:5433:5432"]
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d marketmage"]
      interval: 5s
      timeout: 5s
      retries: 5
    volumes:
      - postgres-data:/var/lib/postgresql/data

  backend:
    build:
      context: ./apps/backend
      dockerfile: Dockerfile
    environment:
      DATABASE_URL: postgresql+psycopg://postgres:${POSTGRES_PASSWORD:-marketmage-local-dev-change-me}@postgres:5432/marketmage
      CORS_ORIGINS: http://localhost:${FRONTEND_PORT:-3000}
      FRANKFURTER_BASE_URL: https://api.frankfurter.dev/v1
    ports:
      - "${BACKEND_PORT:-8000}:8000"
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "--fail", "http://127.0.0.1:8000/healthz"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

  frontend:
    build:
      context: ./apps/frontend
      dockerfile: Dockerfile
    environment:
      BACKEND_INTERNAL_URL: http://backend:8000
      NEXT_PUBLIC_API_BASE_URL: /api
    ports:
      - "${FRONTEND_PORT:-3000}:3000"
    depends_on:
      backend:
        condition: service_healthy

volumes:
  postgres-data:
